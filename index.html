<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CS2 Tactical Adaptive Engine</title>
    <style>
        body, html {
            margin: 0; padding: 0; overflow: hidden;
            width: 100%; height: 100%;
            font-family: 'Segoe UI', Arial, sans-serif;
            user-select: none; -webkit-user-select: none; background-color: #333;
            touch-action: none;
        }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

        /* Navigation Panels Menu UI Matrix */
        #menu-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(30,35,45,0.9) 0%, rgba(15,18,24,0.97) 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; color: #fff;
        }
        .menu-card {
            background: linear-gradient(135deg, #2b303c 0%, #181d26 100%);
            padding: 31px; border-radius: 12px;
            border: 1px solid rgba(222, 155, 53, 0.25);
            text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            width: 85%; max-width: 380px; display: none;
            box-sizing: border-box;
        }
        h1 { margin-top: 0; margin-bottom: 5px; color: #de9b35; letter-spacing: 3px; font-size: 24px; }
        p { color: #aaa; margin-bottom: 15px; font-size: 12px; }

        .btn {
            background: linear-gradient(180deg, #de9b35 0%, #b87a1d 100%);
            color: #fff; border: none; padding: 12px 30px;
            font-size: 13px; font-weight: bold; cursor: pointer;
            border-radius: 4px; text-transform: uppercase; letter-spacing: 1px;
            margin: 8px auto; display: block; width: 85%; transition: all 0.15s;
        }
        .btn:hover { background: linear-gradient(180deg, #ffb84d 0%, #de9b35 100%); }
        .btn.secondary { background: linear-gradient(180deg, #666 0%, #444 100%); color: #eee; }
        .btn.danger { background: linear-gradient(180deg, #cc4444 0%, #992222 100%); color: #fff; }

        .flex-row { display: flex; justify-content: space-around; gap: 10px; margin-bottom: 15px; }
        .team-btn { flex: 1; padding: 12px; border: 2px solid #333; background: #16181f; color: #fff; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .team-btn.selected-ct { border-color: #4a90e2; background: rgba(74,144,226,0.3); }
        .team-btn.selected-t { border-color: #e2904a; background: rgba(226,144,74,0.3); }

        select, input[type="text"], input[type="range"] { width: 100%; box-sizing: border-box; margin-bottom: 15px; background: #161920; color: #fff; border: 1px solid #3a4050; padding: 10px; border-radius: 4px; font-weight: bold; text-align: center; }
        label { display: block; text-align: left; font-size: 12px; color: #ccc; margin-bottom: 4px; }
        .setting-val { float: right; color: #de9b35; font-weight: bold; }
        
        .score-list { text-align: left; background: #0c0e12; padding: 10px 15px; border-radius: 4px; border: 1px solid #222; font-family: monospace; max-height: 80px; overflow-y: auto; color: #55ff55; margin-bottom: 15px;}

        /* HUD Overlay Blueprint Frame */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 2; }
        .hud-panel {
            position: absolute; background: rgba(10,12,16,0.75); color: #fff; padding: 8px 16px;
            font-family: 'Courier New', monospace; font-size: 20px; font-weight: bold; border-radius: 4px;
            border-left: 4px solid #de9b35; backdrop-filter: blur(2px);
        }
        #hp-display { bottom: 15px; left: 15px; border-left-color: #ff4444; }
        #ammo-display { bottom: 15px; right: 15px; text-align: right; width: 140px; }
        #weapon-display { bottom: 65px; right: 15px; font-size: 13px; border: none; color: #de9b35; text-align: right; }
        #match-info { top: 15px; left: 15px; font-size: 12px; font-family: sans-serif; line-height: 1.4; color: #ccc; }
        #timer-display { top: 15px; left: 50%; transform: translateX(-50%); font-size: 24px; border-left: none; color: #ffb84d; }
        #killfeed { top: 15px; right: 15px; width: 220px; display: flex; flex-direction: column; align-items: flex-end; }
        .kill-entry { background: rgba(20, 24, 30, 0.9); color: #fff; border-right: 4px solid #ff4444; padding: 4px 10px; margin-bottom: 4px; border-radius: 4px; font-size: 11px; font-weight: bold; animation: fadeOut 4s forwards; }

        /* TAB Scoreboard Overlay */
        #scoreboard-tab-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 540px; background: rgba(20, 24, 32, 0.94); border: 2px solid #de9b35;
            border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            color: white; font-family: monospace; display: none; padding: 15px; z-index: 8;
        }
        .sb-header { font-size: 20px; font-weight: bold; color: #de9b35; border-bottom: 2px solid #de9b35; padding-bottom: 6px; margin-bottom: 10px; text-align: center; }
        .sb-team-section { margin-bottom: 10px; }
        .sb-team-title-ct { color: #4a90e2; font-size: 14px; font-weight: bold; }
        .sb-team-title-t { color: #e2904a; font-size: 14px; font-weight: bold; }
        .sb-row { display: flex; justify-content: space-between; padding: 4px 8px; font-size: 13px; border-bottom: 1px solid #2a2d35; }
        .sb-col-name { width: 60%; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Crosshair dynamic elements */
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; pointer-events: none; --bloom: 4px; z-index: 2; }
        .tick { position: absolute; background-color: #00ff00; box-shadow: 0 0 0 1px #000000; border-radius: 1px; transition: transform 0.05s linear; }
        .tick.top, .tick.bottom { width: 2px; height: 9px; left: calc(50% - 1px); }
        .tick.left, .tick.right { width: 9px; height: 2px; top: calc(50% - 1px); }
        .tick.top    { top: calc(50% - 9px - var(--bloom)); }
        .tick.bottom { top: calc(50% + var(--bloom)); }
        .tick.left   { left: calc(50% - 9px - var(--bloom)); }
        .tick.right  { left: calc(50% + var(--bloom)); }
        .dot { position: absolute; width: 2px; height: 2px; background-color: #00ff00; box-shadow: 0 0 0 1px #000000; top: calc(50% - 1px); left: calc(50% - 1px); }

        /* Adaptive Scopes Overlay Reticle Display */
        #scope-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 28%, #000000 32%); display: none; pointer-events: none; z-index: 5; }
        #scope-overlay::before { content: ''; position: absolute; top: 0; left: 50%; width: 2px; height: 100%; background: #ff0000; transform: translateX(-50%); opacity: 0.6; }
        #scope-overlay::after { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: #ff0000; transform: translateY(-50%); opacity: 0.6; }

        #vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-shadow: inset 0 0 100px rgba(255,0,0,0); pointer-events: none; transition: box-shadow 0.1s; z-index: 4; }
        .damage-flash { box-shadow: inset 0 0 150px rgba(230, 30, 30, 0.85) !important; }
        @keyframes fadeOut { 0% {opacity: 1;} 85% {opacity: 1;} 100% {opacity: 0;} }

        /* ----------------------- ON-SCREEN MOBILE TOUCH INTERFACE OVERLAYS ----------------------- */
        #mobile-touch-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 3; pointer-events: none; display: none;
        }
        .touch-surface { pointer-events: auto; position: absolute; }
        #touch-move-surface { top: 0; left: 0; width: 50%; height: 100%; }
        #touch-look-surface { top: 0; right: 0; width: 50%; height: 100%; }

        #virtual-joystick-base {
            position: absolute; width: 110px; height: 110px;
            background: rgba(255, 255, 255, 0.12); border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; bottom: 40px; left: 40px; display: none; transform: translate(-50%, -50%);
        }
        #virtual-joystick-knob { position: absolute; width: 44px; height: 44px; background: #de9b35; border-radius: 50%; top: 33px; left: 33px; }

        .m-action-btn {
            pointer-events: auto; position: absolute; background: rgba(20, 24, 32, 0.65); border: 1px solid rgba(222, 155, 53, 0.4);
            color: #fff; border-radius: 50%; font-weight: bold; display: flex; justify-content: center; align-items: center; font-size: 12px;
        }
        .m-action-btn:active { background: rgba(222, 155, 53, 0.5); transform: scale(0.92); }
        
        #m-btn-fire    { right: 35px; bottom: 120px; width: 85px; height: 85px; border-width: 2px; border-color: #ff4444; font-size: 16px; }
        #m-btn-jump    { right: 140px; bottom: 45px; width: 60px; height: 60px; }
        #m-btn-reload  { right: 35px; bottom: 35px; width: 60px; height: 60px; color: #de9b35; }
        #m-btn-cycle   { right: 35px; top: 20px; width: 90px; height: 45px; border-radius: 6px; }
        #m-btn-pause   { left: 50%; top: 15px; transform: translateX(-50%); width: 75px; height: 35px; border-radius: 4px; font-size: 11px; display: none; }
        #m-btn-scores  { right: 140px; top: 20px; width: 65px; height: 45px; border-radius: 6px; }
    </style>
</head>
<body>

    <div id="vignette"></div>
    <div id="scope-overlay"></div>
    
    <div id="crosshair">
        <div class="tick top"></div><div class="tick bottom"></div>
        <div class="tick left"></div><div class="tick right"></div>
        <div class="dot"></div>
    </div>

    <div id="hud">
        <div id="hp-display" class="hud-panel">100</div>
        <div id="weapon-display" class="hud-panel">M4A1-S</div>
        <div id="ammo-display" class="hud-panel">30 / 90</div>
        <div id="timer-display" class="hud-panel">01:30</div>
        <div id="match-info" class="hud-panel">MODE: BOTS<br>TEAM: <span id="team-label">CT</span><br>KILLS: <span id="kill-count">0</span></div>
        <div id="killfeed"></div>
    </div>

    <div id="mobile-touch-layer">
        <div class="touch-surface" id="touch-move-surface"></div>
        <div class="touch-surface" id="touch-look-surface"></div>
        <div id="virtual-joystick-base"><div id="virtual-joystick-knob"></div></div>
        <div class="m-action-btn" id="m-btn-fire">FIRE</div>
        <div class="m-action-btn" id="m-btn-jump">JUMP</div>
        <div class="m-action-btn" id="m-btn-reload">RELOAD</div>
        <div class="m-action-btn" id="m-btn-cycle">GUN (1-3)</div>
        <div class="m-action-btn" id="m-btn-scores">SCORES</div>
        <div class="m-action-btn" id="m-btn-pause">PAUSE</div>
    </div>

    <div id="scoreboard-tab-overlay">
        <div class="sb-header">MATCH STATUS MODULE</div>
        <div class="sb-team-section"><div class="sb-team-title-ct">COUNTER-TERRORISTS</div><div id="sb-container-ct"></div></div>
        <div class="sb-team-section"><div class="sb-team-title-t">TERRORISTS</div><div id="sb-container-t"></div></div>
    </div>

    <div id="menu-overlay">
        <div class="menu-card" id="card-main" style="display: block;">
            <h1>TACTICAL DISPATCH</h1>
            <p>CS2 Cross-Input Adaptive Framework</p>
            
            <label>ENTER OPERATOR IDENT NAME:</label>
            <input type="text" id="player-profile-name" value="Player_1" onchange="saveProfileConfigState()">

            <button class="btn" onclick="switchActiveUiCard('card-lobby-bots')">VS Bots Arena</button>
            <button class="btn" onclick="switchActiveUiCard('card-lobby-mp')">Multiplayer Lobbies</button>
            <button class="btn secondary" onclick="switchActiveUiCard('card-settings')">Settings</button>
        </div>

        <div class="menu-card" id="card-lobby-bots">
            <h1>BOT MATCH SETUP</h1>
            <div class="flex-row">
                <button class="team-btn selected-ct" id="bot-ct-btn" onclick="setFactionSelection('ct')">Police (CT)</button>
                <button class="team-btn" id="bot-t-btn" onclick="setFactionSelection('t')">Terrorist (T)</button>
            </div>
            <label>HIGH SCORE LOGS:</label><div class="score-list" id="bot-highscore-board">NO RECORDS FOUND</div>
            <button class="btn" onclick="initializeMatchDeployment('bots')">Deploy vs Bots</button>
            <button class="btn secondary" onclick="switchActiveUiCard('card-main')">Main Menu</button>
        </div>

        <div class="menu-card" id="card-lobby-mp">
            <h1>MULTIPLAYER ROOM</h1>
            <input type="text" id="mp-room-code" value="ROOM_1">
            <div class="flex-row">
                <button class="team-btn selected-ct" id="mp-ct-btn" onclick="setFactionSelection('ct')">Police (CT)</button>
                <button class="team-btn" id="mp-t-btn" onclick="setFactionSelection('t')">Terrorist (T)</button>
            </div>
            <button class="btn" onclick="initializeMatchDeployment('mp')">Connect Server</button>
            <button class="btn secondary" onclick="switchActiveUiCard('card-main')">Main Menu</button>
        </div>

        <div class="menu-card" id="card-settings">
            <h1>ENGINE SETTINGS</h1>
            
            <label>CONTROL INTERFACE TYPE:</label>
            <select id="select-input-type" onchange="saveProfileConfigState()">
                <option value="mouse" selected>MOUSE & KEYBOARD (DESKTOP)</option>
                <option value="touch">TOUCH CONTROLS (MOBILE/TABLET)</option>
            </select>

            <label>AIM SENSITIVITY: <span class="setting-val" id="sens-txt">1.0</span></label>
            <input type="range" id="slider-sens" min="0.1" max="4.0" step="0.1" value="1.0" oninput="applySensitivitySlider(this.value)">
            
            <button class="btn" onclick="switchActiveUiCard('card-main')">Back to Menu</button>
        </div>

        <div class="menu-card" id="card-pause">
            <h1>MATCH PAUSED</h1>
            <button class="btn" onclick="resumeMatchFromPause()">Resume Match</button>
            <button class="btn secondary" onclick="exitMatchToMainMenu()">Quit to Lobby</button>
        </div>

        <div class="menu-card" id="card-scoreboard">
            <h1>MATCH CONCLUDED</h1><div class="score-list" id="board-stats" style="max-height:140px;"></div>
            <button class="btn secondary" onclick="exitMatchToMainMenu()">Return to Lobby</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script>
        // --- BASE TACTICAL DIALS ---
        const WEAPONS = {
            1: { name: 'USP-S PISTOL', maxAmmo: 12, reserve: 24, currentAmmo: 12, automatic: false, fireRate: 200, damage: 35, reloadTime: 1400, recoil: 0.006, baseBloom: 2, zoomFov: null },
            2: { name: 'M4A1-S RIFLE', maxAmmo: 30, reserve: 90, currentAmmo: 30, automatic: true, fireRate: 100, damage: 26, reloadTime: 2400, recoil: 0.016, baseBloom: 5, zoomFov: 34 }, 
            3: { name: 'AWP SNIPER', maxAmmo: 5, reserve: 10, currentAmmo: 5, automatic: false, fireRate: 1450, damage: 115, reloadTime: 3600, recoil: 0.07, baseBloom: 0.5, zoomFov: 14 }  
        };

        let state = {
            hp: 100, kills: 0, deaths: 0, activeWeapon: 2, isReloading: false, isScoped: false,
            playerTeam: 'ct', botTeam: 't', difficulty: 'medium', matchMode: 'bots',
            inputType: 'mouse', sensitivity: 0.0019, crosshairBloom: 0, moveBloom: 0, recoilPitch: 0, recoilYaw: 0,
            roundTimeRemaining: 90, matchActive: false, isPaused: false, botIdCounter: 100, socket: null, roomCode: '', playerName: 'Player_1'
        };

        let lookState = { pitch: 0, yaw: 0 }, highScoresBots = JSON.parse(localStorage.getItem('cs_highscores_bots')) || [];
        let wishVelocity = new THREE.Vector3(), currentVelocity = new THREE.Vector3(), scene, camera, renderer, clock, gunGroup;
        let keys = {}, isGrounded = true, lastFired = 0, lastTickSecond = 0, activeBots = [], worldBoxes = [], ammoPacks = [], remotePlayers = {}, scoreRegistryData = {};

        // Mobile Tracker Vectors
        let mobileKeys = { w: false, s: false, a: false, d: false, jump: false, fire: false };
        let joystickTouchId = null, lookTouchId = null, joystickStartPos = new THREE.Vector2(), lastLookPos = new THREE.Vector2();

        const TEAM_SPAWNS = { ct: new THREE.Vector3(0, 1.72, 48), t: new THREE.Vector3(0, 1.72, -48) };
        const crosshair = document.getElementById('crosshair'), hpDisplay = document.getElementById('hp-display'), ammoDisplay = document.getElementById('ammo-display'), weaponDisplay = document.getElementById('weapon-display'), timerDisplay = document.getElementById('timer-display');

        // --- PREFERENCE CONFIGURATION CACHE MANAGERS ---
        function loadSavedConfigState() {
            const savedName = localStorage.getItem('cs_player_name');
            const savedSens = localStorage.getItem('cs_mouse_sensitivity');
            const savedInput = localStorage.getItem('cs_input_type');
            if (savedName) { state.playerName = savedName; document.getElementById('player-profile-name').value = savedName; }
            if (savedInput) { state.inputType = savedInput; document.getElementById('select-input-type').value = savedInput; }
            if (savedSens) {
                const numSens = parseFloat(savedSens);
                state.sensitivity = numSens * (state.inputType === 'touch' ? 0.0035 : 0.0019);
                document.getElementById('slider-sens').value = numSens; document.getElementById('sens-txt').innerText = savedSens;
            }
        }
        function saveProfileConfigState() {
            state.playerName = document.getElementById('player-profile-name').value.trim() || 'Player_1';
            state.inputType = document.getElementById('select-input-type').value;
            localStorage.setItem('cs_player_name', state.playerName);
            localStorage.setItem('cs_input_type', state.inputType);
            
            const val = document.getElementById('slider-sens').value;
            state.sensitivity = parseFloat(val) * (state.inputType === 'touch' ? 0.0035 : 0.0019);
        }
        function applySensitivitySlider(val) {
            document.getElementById('sens-txt').innerText = val;
            localStorage.setItem('cs_mouse_sensitivity', val);
            state.sensitivity = parseFloat(val) * (state.inputType === 'touch' ? 0.0035 : 0.0019);
        }

        function switchActiveUiCard(id) { document.querySelectorAll('.menu-card').forEach(c => c.style.display = 'none'); document.getElementById(id).style.display = 'block'; if (id === 'card-lobby-bots') renderHighScoreList(); }
        function setFactionSelection(f) { state.playerTeam = f; state.botTeam = f === 'ct' ? 't' : 'ct'; document.getElementById('team-label').innerText = f.toUpperCase(); }
        function renderHighScoreList() { const b = document.getElementById('bot-highscore-board'); if (highScoresBots.length === 0) { b.innerText = "NO RECORDS FOUND"; return; } b.innerHTML = highScoresBots.map((s, i) => `#${i+1} - KILLS: ${s.kills} | ${s.date}`).join('<br>'); }

        // --- LAUNCH DESCENT CONTROLLERS ---
        function initializeMatchDeployment(mode) {
            saveProfileConfigState(); state.matchMode = mode; state.roundTimeRemaining = mode === 'bots' ? 90 : 180; state.kills = 0; state.deaths = 0; state.hp = 100; lookState.pitch = 0; lookState.yaw = 0;
            scoreRegistryData = { "local": { name: `${state.playerName} (YOU)`, team: state.playerTeam, kills: 0, deaths: 0, isLocal: true } };
            Object.keys(WEAPONS).forEach(k => WEAPONS[k].currentAmmo = WEAPONS[k].maxAmmo); WEAPONS[1].reserve = 24; WEAPONS[2].reserve = 90; WEAPONS[3].reserve = 10;
            document.getElementById('match-info').innerHTML = `MODE: ${mode.toUpperCase()}<br>TEAM: ${state.playerTeam.toUpperCase()}<br>KILLS: <span id="kill-count" style="color:#55ff55;">0</span>`;

            if (mode === 'bots') populateOpponentsFixedBase(); else setupMultiplayerNetworkConnection();

            document.getElementById('menu-overlay').style.display = 'none';
            document.getElementById('hud').style.display = 'block';

            if (state.inputType === 'touch') {
                document.getElementById('mobile-touch-layer').style.display = 'block';
                document.getElementById('m-btn-pause').style.display = 'flex';
            } else {
                renderer.domElement.requestPointerLock();
            }

            state.matchActive = true; state.isPaused = false; lastTickSecond = performance.now();
        }

        function setupMultiplayerNetworkConnection() {
            const SERVER_URL = "https://cs-multiplayer-server.onrender.com";
            pushKillfeedLog("NETWORK", "CONNECTING..."); state.socket = io(SERVER_URL);
            state.socket.on('connect', () => { pushKillfeedLog("NETWORK", `CONNECTED: ${state.roomCode}`); state.socket.emit('joinRoom', { roomCode: state.roomCode, team: state.playerTeam, name: state.playerName }); });
            camera.position.copy(TEAM_SPAWNS[state.playerTeam]);
            state.socket.on('currentPlayers', (p) => { Object.keys(p).forEach((id) => { if (id !== state.socket.id) { spawnRemotePlayerAvatar(p[id]); scoreRegistryData[id] = { name: p[id].name, team: p[id].team, kills: p[id].kills||0, deaths: p[id].deaths||0 }; } }); });
            state.socket.on('newPlayer', (p) => { pushKillfeedLog("SERVER", `${p.name} joined`); spawnRemotePlayerAvatar(p); scoreRegistryData[p.id] = { name: p.name, team: p.team, kills: 0, deaths: 0 }; });
            state.socket.on('playerMoved', (p) => { if (remotePlayers[p.id]) { remotePlayers[p.id].position.set(p.x, p.y - 0.85, p.z); remotePlayers[p.id].rotation.set(p.rx, p.ry, 0); } });
            state.socket.on('enemyFired', (d) => { drawTracerBeam(new THREE.Vector3(d.origin.x, d.origin.y, d.origin.z), new THREE.Vector3(d.direction.x, d.direction.y, d.direction.z), 0xffaa00); });
            state.socket.on('playerDisconnected', (id) => { if (remotePlayers[id]) { scene.remove(remotePlayers[id]); delete remotePlayers[id]; delete scoreRegistryData[id]; } });
        }

        function spawnRemotePlayerAvatar(d) { if (remotePlayers[d.id]) return; const g = new THREE.Group(); const b = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 1.75), new THREE.MeshStandardMaterial({ color: d.team === 'ct' ? 0x2e5c99 : 0xab3a2b })); b.position.y = 0.875; g.add(b); const h = new THREE.Mesh(new THREE.SphereGeometry(0.23), new THREE.MeshStandardMaterial({ color: 0xe0b296 })); h.position.y = 1.95; g.add(h); g.position.set(d.x, d.y - 0.85, d.z); scene.add(g); remotePlayers[d.id] = g; }
        function resumeMatchFromPause() { if (state.inputType === 'mouse') renderer.domElement.requestPointerLock(); else { state.isPaused = false; document.getElementById('menu-overlay').style.display = 'none'; } }

        function setupInputProfiles() {
            const canvasElement = renderer.domElement;

            document.addEventListener('pointerlockchange', () => {
                if (state.inputType !== 'mouse') return;
                if (document.pointerLockElement === document.body || document.pointerLockElement === canvasElement) {
                    state.isPaused = false; document.getElementById('menu-overlay').style.display = 'none'; document.getElementById('hud').style.display = 'block';
                } else {
                    if (state.matchActive) { state.isPaused = true; document.getElementById('scoreboard-tab-overlay').style.display = 'none'; document.getElementById('menu-overlay').style.display = 'flex'; switchActiveUiCard('card-pause'); }
                }
            });
            canvasElement.addEventListener('click', () => { if (state.matchActive && !state.isPaused && state.inputType === 'mouse') canvasElement.requestPointerLock(); });

            document.addEventListener('mousemove', (e) => {
                if (!document.pointerLockElement || state.isPaused || state.inputType !== 'mouse') return;
                let currentSensMod = state.isScoped ? 0.35 : 1.0;
                lookState.yaw -= e.movementX * state.sensitivity * currentSensMod;
                lookState.pitch -= e.movementY * state.sensitivity * currentSensMod;
                lookState.pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, lookState.pitch));
            });

            window.addEventListener('keydown', (e) => {
                if (e.key === 'Tab') { e.preventDefault(); if (state.matchActive && !state.isPaused) { rebuildLiveLeaderboardOverlay(); document.getElementById('scoreboard-tab-overlay').style.display = 'block'; } return; }
                if (state.isPaused || state.inputType !== 'mouse') return;
                keys[e.key.toLowerCase()] = true;
                if(['1','2','3'].includes(e.key)) switchActiveSlots(parseInt(e.key));
                if(e.key.toLowerCase() === 'r') executeReloadProcedure();
            });
            window.addEventListener('keyup', (e) => { if (e.key === 'Tab') { e.preventDefault(); document.getElementById('scoreboard-tab-overlay').style.display = 'none'; return; } keys[e.key.toLowerCase()] = false; });
            window.addEventListener('mousedown', (e) => { if (!document.pointerLockElement || state.isPaused || state.inputType !== 'mouse') return; if (e.button === 0) keys.fire = true; if (e.button === 2 && WEAPONS[state.activeWeapon].zoomFov !== null) toggleScopeLayer(); });
            window.addEventListener('mouseup', (e) => { if (e.button === 0) keys.fire = false; });
            window.addEventListener('contextmenu', e => e.preventDefault());

            // ----------------------- TOUCH CONTROLLER DETECTORS -----------------------
            const mMove = document.getElementById('touch-move-surface'), mLook = document.getElementById('touch-look-surface'), jsBase = document.getElementById('virtual-joystick-base'), jsKnob = document.getElementById('virtual-joystick-knob');

            mMove.addEventListener('touchstart', (e) => {
                if (!state.matchActive || state.isPaused || state.inputType !== 'touch') return;
                const t = e.changedTouches[0]; joystickTouchId = t.identifier; joystickStartPos.set(t.clientX, t.clientY);
                jsBase.style.left = `${t.clientX}px`; jsBase.style.top = `${t.clientY}px`; jsBase.style.display = 'block';
            });
            mMove.addEventListener('touchmove', (e) => {
                if (joystickTouchId === null) return;
                for (let t of e.touches) {
                    if (t.identifier === joystickTouchId) {
                        let dir = new THREE.Vector2(t.clientX, t.clientY).sub(joystickStartPos);
                        if (dir.length() > 40) dir.normalize().multiplyScalar(40);
                        jsKnob.style.transform = `translate(${dir.x}px, ${dir.y}px)`;
                        mobileKeys.w = dir.y < -12; mobileKeys.s = dir.y > 12; mobileKeys.d = dir.x > 12; mobileKeys.a = dir.x < -12;
                    }
                }
            });
            mMove.addEventListener('touchend', (e) => { for (let t of e.changedTouches) { if (t.identifier === joystickTouchId) { joystickTouchId = null; jsBase.style.display = 'none'; mobileKeys.w = mobileKeys.s = mobileKeys.a = mobileKeys.d = false; } } });

            mLook.addEventListener('touchstart', (e) => { if (!state.matchActive || state.isPaused || state.inputType !== 'touch') return; const t = e.changedTouches[0]; lookTouchId = t.identifier; lastLookPos.set(t.clientX, t.clientY); });
            mLook.addEventListener('touchmove', (e) => {
                if (lookTouchId === null) return;
                for (let t of e.touches) {
                    if (t.identifier === lookTouchId) {
                        let currentSensMod = state.isScoped ? 0.35 : 1.0;
                        lookState.yaw -= (t.clientX - lastLookPos.x) * state.sensitivity * currentSensMod;
                        lookState.pitch -= (t.clientY - lastLookPos.y) * state.sensitivity * currentSensMod;
                        lookState.pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, lookState.pitch));
                        lastLookPos.set(t.clientX, t.clientY);
                    }
                }
            });
            mLook.addEventListener('touchend', (e) => { for (let t of e.changedTouches) { if (t.identifier === lookTouchId) lookTouchId = null; } });

            const linkTouchBtn = (id, dn, up) => {
                const el = document.getElementById(id);
                el.addEventListener('touchstart', (e) => { e.preventDefault(); dn(); });
                if (up) el.addEventListener('touchend', (e) => { e.preventDefault(); up(); });
            };
            linkTouchBtn('m-btn-fire', () => mobileKeys.fire = true, () => mobileKeys.fire = false);
            linkTouchBtn('m-btn-jump', () => { if(isGrounded) mobileKeys.jump = true; });
            linkTouchBtn('m-btn-reload', () => executeReloadProcedure());
            linkTouchBtn('m-btn-cycle', () => { let t = state.activeWeapon + 1; if(t > 3) t = 1; switchActiveSlots(t); });
            linkTouchBtn('m-btn-pause', () => { state.isPaused = true; document.getElementById('scoreboard-tab-overlay').style.display = 'none'; document.getElementById('menu-overlay').style.display = 'flex'; switchActiveUiCard('card-pause'); });
            linkTouchBtn('m-btn-scores', () => { const b = document.getElementById('scoreboard-tab-overlay'); if (b.style.display === 'block') b.style.display = 'none'; else { rebuildLiveLeaderboardOverlay(); b.style.display = 'block'; } });
        }

        function populateOpponentsFixedBase() {
            activeBots.forEach(b => b.destroy(scene)); activeBots = []; camera.position.copy(TEAM_SPAWNS[state.playerTeam]);
            const base = TEAM_SPAWNS[state.botTeam]; const offsets = [{x: -6, z: 0}, {x: -2, z: 2}, {x: 2, z: -2}, {x: 6, z: 0}];
            offsets.forEach((offset) => {
                state.botIdCounter++; const tag = `Bot_Elite_${state.botIdCounter - 100}`;
                activeBots.push(new TacticalCoverAgent(base.x + offset.x, base.z + offset.z, state.botIdCounter, tag));
                scoreRegistryData[state.botIdCounter] = { name: tag, team: state.botTeam, kills: 0, deaths: 0 };
            });
            updateHudDisplay();
        }

        function switchActiveSlots(slot) { if (state.isReloading || state.activeWeapon === slot) return; if (state.isScoped) toggleScopeLayer(); state.activeWeapon = slot; updateHudDisplay(); }
        function executeReloadProcedure() {
            const w = WEAPONS[state.activeWeapon]; if (state.isReloading || w.currentAmmo === w.maxAmmo || w.reserve <= 0) return;
            state.isReloading = true; if (state.isScoped) toggleScopeLayer(); weaponDisplay.innerText = "RELOADING...";
            setTimeout(() => { const p = Math.min(w.maxAmmo - w.currentAmmo, w.reserve); w.currentAmmo += p; w.reserve -= p; state.isReloading = false; updateHudDisplay(); }, w.reloadTime);
        }

        function toggleScopeLayer() {
            state.isScoped = !state.isScoped; const scope = document.getElementById('scope-overlay');
            if (state.isScoped) { scope.style.display = 'block'; camera.fov = WEAPONS[state.activeWeapon].zoomFov; crosshair.style.display = 'none'; gunGroup.visible = false; } 
            else { scope.style.display = 'none'; camera.fov = 68; crosshair.style.display = 'block'; gunGroup.visible = true; }
            camera.updateProjectionMatrix();
        }

        function executeBallisticCalculation(timeNow) {
            const w = WEAPONS[state.activeWeapon];
            let triggerPulled = state.inputType === 'touch' ? mobileKeys.fire : keys.fire;
            if (!triggerPulled || state.isReloading || timeNow - lastFired < w.fireRate) return;
            if (w.currentAmmo <= 0) { executeReloadProcedure(); if(state.inputType === 'mouse') keys.fire = false; return; }

            w.currentAmmo--; lastFired = timeNow; updateHudDisplay();
            let scopeAccuracyBonus = state.isScoped ? 0.25 : 1.0;
            const netSpread = (w.baseBloom + state.moveBloom + state.crosshairBloom) * 0.0022 * scopeAccuracyBonus;
            state.crosshairBloom = Math.min(35, state.crosshairBloom + w.recoil * 350); state.recoilPitch += w.recoil; state.recoilYaw += (Math.random() - 0.5) * w.recoil * 0.5;

            const ray = new THREE.Raycaster(); const fwd = new THREE.Vector3(); camera.getWorldDirection(fwd); fwd.x += (Math.random() - 0.5) * netSpread; fwd.y += (Math.random() - 0.5) * netSpread; ray.set(camera.position, fwd.normalize());
            const gunTip = camera.position.clone().add(new THREE.Vector3(0.1,-0.15,-0.45)); drawTracerBeam(gunTip, fwd, 0xffd060);

            if (state.matchMode === 'mp' && state.socket) { state.socket.emit('playerFire', { roomCode: state.roomCode, origin: gunTip, direction: fwd }); }
            let meshes = []; activeBots.forEach(b => { meshes.push(b.headMesh, b.torsoMesh, b.legsMesh); });
            const hits = ray.intersectObjects(meshes);
            if (hits.length > 0) {
                const part = hits[0].object; const bot = activeBots.find(b => b.id === part.userData.ownerId);
                if (bot) {
                    let dmg = w.damage, mult = part.userData.bodyPart === 'head' ? 4.0 : (part.userData.bodyPart === 'legs' ? 0.65 : 1.0);
                    bot.takeDamage(dmg * mult, part.userData.bodyPart.toUpperCase());
                }
            }
            if (!w.automatic) { keys.fire = false; mobileKeys.fire = false; }
        }

        function drawTracerBeam(s, d, c) { const geo = new THREE.BufferGeometry().setFromPoints([s, s.clone().add(d.multiplyScalar(60))]); const l = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: c })); scene.add(l); setTimeout(() => scene.remove(l), 30); }

        class AmmoPackPickup {
            constructor(x, z) { this.mesh = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.3, 0.4), new THREE.MeshStandardMaterial({ color: 0x448c5a, emissive: 0x0a220a })); this.mesh.position.set(x, 0.15, z); scene.add(this.mesh); }
            checkCollision(pos) { if (this.mesh.position.distanceTo(pos) < 1.5) { scene.remove(this.mesh); WEAPONS[1].reserve = Math.min(60, WEAPONS[1].reserve + 12); WEAPONS[2].reserve = Math.min(150, WEAPONS[2].reserve + 30); WEAPONS[3].reserve = Math.min(25, WEAPONS[3].reserve + 5); updateHudDisplay(); pushKillfeedLog("SYSTEM", "AMMO RESTOCKED"); return true; } return false; }
        }

        class TacticalCoverAgent {
            constructor(x, z, id, nameTag) {
                this.id = id; this.hp = 100; this.nameTag = nameTag; this.lastShot = 0; this.roamTarget = new THREE.Vector3(); this.mesh = new THREE.Group(); const c = state.botTeam === 'ct' ? 0x2a528c : 0xa13626;
                this.torsoMesh = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.0, 0.35), new THREE.MeshStandardMaterial({ color: c })); this.torsoMesh.position.y = 1.0; this.torsoMesh.userData = { ownerId: id, bodyPart: 'torso' }; this.mesh.add(this.torsoMesh);
                this.headMesh = new THREE.Mesh(new THREE.SphereGeometry(0.22), new THREE.MeshStandardMaterial({ color: 0xddaa88 })); this.headMesh.position.y = 1.68; this.headMesh.userData = { ownerId: id, bodyPart: 'head' }; this.mesh.add(this.headMesh);
                this.legsMesh = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.5, 0.3), new THREE.MeshStandardMaterial({ color: 0x15181c })); this.legsMesh.position.y = 0.25; this.legsMesh.userData = { ownerId: id, bodyPart: 'legs' }; this.mesh.add(this.legsMesh);
                this.mesh.position.set(x, 0, z); scene.add(this.mesh); this.generateNewRoamTarget();
            }
            generateNewRoamTarget() { this.roamTarget.set((Math.random() - 0.5) * 95, 0, (Math.random() - 0.5) * 95); }
            executeActionCycle(delta, now) {
                const dist = this.mesh.position.distanceTo(camera.position); const vec = new THREE.Vector3().subVectors(camera.position, this.mesh.position).normalize(); const ray = new THREE.Raycaster(this.mesh.position.clone().add(new THREE.Vector3(0, 1.4, 0)), vec); const blocks = ray.intersectObjects(worldBoxes); const wall = blocks.length > 0 && blocks[0].distance < dist;
                if (!wall && dist < 50) { this.mesh.lookAt(camera.position.x, this.mesh.position.y, camera.position.z); if (now - this.lastShot > 1350) { this.lastShot = now; if (Math.random() < 0.30) deductPlayerHealth(14); drawTracerBeam(this.mesh.position.clone().add(new THREE.Vector3(0,1.5,0)), vec, 0xff3333); if(Math.random() < 0.3) this.generateNewRoamTarget(); } if(dist > 10) this.mesh.translateZ(3.2 * delta); }
                else { this.mesh.lookAt(this.roamTarget.x, this.mesh.position.y, this.roamTarget.z); this.mesh.translateZ(3.0 * delta); if (this.mesh.position.distanceTo(this.roamTarget) < 2.0) this.generateNewRoamTarget(); }
            }
            takeDamage(dmg, log) { this.hp -= dmg; pushKillfeedLog("HIT DETAIL", `${log} (${Math.floor(dmg)} DMG)`); if (this.hp <= 0) { this.destroy(scene); activeBots = activeBots.filter(b => b.id !== this.id); state.kills++; if(scoreRegistryData["local"]) scoreRegistryData["local"].kills = state.kills; if(scoreRegistryData[this.id]) scoreRegistryData[this.id].deaths++; updateHudDisplay(); ammoPacks.push(new AmmoPackPickup(this.mesh.position.x, this.mesh.position.z)); setTimeout(() => { if (state.matchActive && state.matchMode === 'bots') { const b = TEAM_SPAWNS[state.botTeam]; state.botIdCounter++; const next = `Bot_Elite_${state.botIdCounter - 100}`; activeBots.push(new TacticalCoverAgent(b.x + (Math.random()-0.5)*10, b.z, state.botIdCounter, next)); scoreRegistryData[state.botIdCounter] = { name: next, team: state.botTeam, kills: 0, deaths: 0 }; } }, 2500); } }
            destroy(s) { s.remove(this.mesh); this.headMesh.geometry.dispose(); this.torsoMesh.geometry.dispose(); this.legsMesh.geometry.dispose(); }
        }

        function deductPlayerHealth(dmg) {
            if (state.hp <= 0 || !state.matchActive || state.isPaused) return; state.hp = Math.max(0, state.hp - dmg); updateHudDisplay();
            document.getElementById('vignette').classList.add('damage-flash'); setTimeout(() => document.getElementById('vignette').classList.remove('damage-flash'), 90);
            if (state.hp <= 0) { state.deaths++; if(scoreRegistryData["local"]) scoreRegistryData["local"].deaths = state.deaths; if (state.matchMode === 'bots') { state.matchActive = false; if(state.inputType === 'mouse') document.exitPointerLock(); else toggleInternalPauseState(); } else { pushKillfeedLog("SERVER", "RESPAWNED"); state.hp = 100; camera.position.copy(TEAM_SPAWNS[state.playerTeam]); updateHudDisplay(); } }
        }

        function processTimeExhaustionConclusion() {
            state.matchActive = false; state.isPaused = false; if(state.inputType === 'mouse') document.exitPointerLock();
            document.getElementById('hud').style.display = 'none'; document.getElementById('scoreboard-tab-overlay').style.display = 'none'; document.getElementById('mobile-touch-layer').style.display = 'none'; if (state.isScoped) toggleScopeLayer();
            const statsBox = document.getElementById('board-stats');
            if (state.matchMode === 'bots') { document.getElementById('board-title').innerText = "TIME EXHAUSTED"; statsBox.innerHTML = `YOUR KILLS: ${state.kills}`; highScoresBots.push({ kills: state.kills, date: new Date().toLocaleTimeString() }); highScoresBots.sort((a,b) => b.kills - a.kills).slice(0, 5); localStorage.setItem('cs_highscores_bots', JSON.stringify(highScoresBots)); } 
            else { document.getElementById('board-title').innerText = "MATCH COMPLETED"; let boardData = Object.values(scoreRegistryData).sort((a,b) => b.kills - a.kills); statsBox.innerHTML = boardData.map((p, idx) => `#${idx+1} ${p.name} - ${p.kills} KILLS`).join('<br>'); }
            if(state.socket) state.socket.disconnect(); switchActiveUiCard('card-scoreboard');
        }

        function exitMatchToMainMenu() { state.matchActive = false; state.isPaused = false; if (state.isScoped) toggleScopeLayer(); activeBots.forEach(b => b.destroy(scene)); activeBots = []; ammoPacks.forEach(a => scene.remove(a.mesh)); ammoPacks = []; Object.keys(remotePlayers).forEach(id => scene.remove(remotePlayers[id])); remotePlayers = {}; document.getElementById('scoreboard-tab-overlay').style.display = 'none'; document.getElementById('mobile-touch-layer').style.display = 'none'; if(state.socket) state.socket.disconnect(); switchActiveUiCard('card-main'); }

        function frameUpdateLoop() {
            requestAnimationFrame(frameUpdateLoop); const delta = Math.min(0.03, clock.getDelta()); const tickTime = performance.now();
            let isCurrentlyControlling = state.inputType === 'touch' ? (state.matchActive && !state.isPaused) : (document.pointerLockElement && state.matchActive && !state.isPaused);

            if (isCurrentlyControlling) {
                if (tickTime - lastTickSecond >= 1000) { state.roundTimeRemaining--; lastTickSecond = tickTime; let mins = Math.floor(state.roundTimeRemaining / 60).toString().padStart(2, '0'), secs = (state.roundTimeRemaining % 60).toString().padStart(2, '0'); timerDisplay.innerText = `${mins}:${secs}`; if (state.roundTimeRemaining <= 0) { processTimeExhaustionConclusion(); return; } }
                state.recoilPitch = THREE.MathUtils.lerp(state.recoilPitch, 0, 0.12); state.recoilYaw = THREE.MathUtils.lerp(state.recoilYaw, 0, 0.12); lookState.pitch += state.recoilPitch * 0.05; lookState.yaw += state.recoilYaw * 0.05;
                camera.rotation.set(0, 0, 0); camera.rotation.y = lookState.yaw; camera.rotation.x = lookState.pitch;

                const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion); fwd.y = 0; fwd.normalize();
                const side = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion); side.y = 0; side.normalize();

                let movingUp = state.inputType === 'touch' ? mobileKeys.w : keys.w;
                let movingDn = state.inputType === 'touch' ? mobileKeys.s : keys.s;
                let movingRt = state.inputType === 'touch' ? mobileKeys.d : keys.d;
                let movingLt = state.inputType === 'touch' ? mobileKeys.a : keys.a;

                wishVelocity.set(0,0,0);
                if (movingUp) wishVelocity.add(fwd); if (movingDn) wishVelocity.add(fwd.clone().negate());
                if (movingRt) wishVelocity.add(side); if (movingLt) wishVelocity.add(side.clone().negate());
                
                let speedCap = (state.inputType === 'mouse' && keys['shift']) ? 2.3 : 5.0;
                if (state.isScoped) speedCap *= 0.5; wishVelocity.normalize().multiplyScalar(speedCap);

                let horizVel = new THREE.Vector3(currentVelocity.x, 0, currentVelocity.z);
                if (horizVel.length() > 0) { let scaling = Math.max(0, horizVel.length() - (horizVel.length() * 6.2 * delta)) / horizVel.length(); currentVelocity.x *= scaling; currentVelocity.z *= scaling; }
                let currentProjSpeed = new THREE.Vector3(currentVelocity.x, 0, currentVelocity.z).dot(wishVelocity.clone().normalize());
                let speedGain = wishVelocity.length() - currentProjSpeed;
                if (speedGain > 0) { currentVelocity.addScaledVector(wishVelocity.clone().normalize(), Math.min(50 * delta * wishVelocity.length(), speedGain)); }

                if (!isGrounded) currentVelocity.y -= 23.0 * delta; camera.position.addScaledVector(currentVelocity, delta);
                if (camera.position.y < 1.72) { camera.position.y = 1.72; currentVelocity.y = 0; isGrounded = true; }
                
                let jumpTriggered = state.inputType === 'touch' ? mobileKeys.jump : keys[' '];
                if (jumpTriggered && isGrounded) { currentVelocity.y = 6.8; isGrounded = false; if(state.inputType === 'touch') mobileKeys.jump = false; }

                if (state.matchMode === 'mp' && state.socket && state.socket.connected) { state.socket.emit('playerMovement', { roomCode: state.roomCode, x: camera.position.x, y: camera.position.y, z: camera.position.z, rx: camera.rotation.x, ry: camera.rotation.y }); }
                for (let i = ammoPacks.length - 1; i >= 0; i--) { if (ammoPacks[i].checkCollision(camera.position)) ammoPacks.splice(i, 1); }

                state.moveBloom = horizVel.length() > 1.0 ? 10 : 0; state.crosshairBloom = THREE.MathUtils.lerp(state.crosshairBloom, 0, 0.15);
                let totalCalculatedGap = Math.max(2, WEAPONS[state.activeWeapon].baseBloom + state.moveBloom + state.crosshairBloom); crosshair.style.setProperty('--bloom', `${totalCalculatedGap}px`);

                gunGroup.position.copy(camera.position); gunGroup.rotation.copy(camera.rotation);
                executeBallisticCalculation(tickTime); if (state.matchMode === 'bots') activeBots.forEach(b => b.executeActionCycle(delta, tickTime));
            }
            renderer.render(scene, camera);
        }

        initGame(); frameUpdateLoop();
    </script>
